# ===== 企业微信应用消息配置 =====
# 企业ID（管理后台 -> 我的企业 -> 企业信息 -> 企业ID）
wework.app.corp-id=${WEWORK_CORP_ID:}
# 应用Secret（管理后台 -> 应用管理 -> 对应应用 -> Secret）
wework.app.corp-secret=${WEWORK_CORP_SECRET:}
# 应用AgentId（管理后台 -> 应用管理 -> 对应应用 -> AgentId）
wework.app.agent-id=${WEWORK_AGENT_ID:}
# true=模拟推送（不实际发送），false=真实推送
wework.app.mock.enabled=true

# ===== 微信公众号配置 =====
# 公众号 AppID（微信公众平台 -> 设置 -> 基本配置）
wechat.mp.app-id=${WECHAT_MP_APP_ID:}
# 公众号 AppSecret
wechat.mp.app-secret=${WECHAT_MP_APP_SECRET:}
# 模板消息模板ID（公众平台 -> 功能 -> 模板消息 -> 新建模板后获得）
wechat.mp.template-id=${WECHAT_MP_TEMPLATE_ID:}
# 用户点击模板消息后跳转的URL（可选）
wechat.mp.redirect-url=
# true=模拟推送（不实际发送），false=真实推送
wechat.mp.mock.enabled=true